# /etc/ipsec.conf - Libreswan IPsec configuration file

config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	plutodebug=all
	dumpdir=/tmp

conn westnet-eastnet-ikev2
	left=192.1.2.45
	leftsubnet=192.0.1.0/24
	leftid=%fromcert
	leftauth=digsig
	right=192.1.2.23
	rightsubnet=192.0.2.0/24
	rightcert=east
	rightid=%fromcert
	rightauth=digsig
