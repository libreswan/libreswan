# /etc/ipsec.conf - Libreswan IPsec configuration file

config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	plutodebug=all
	dumpdir=/tmp

conn east-west
	also=west-east-base-ipv4
	leftid=@west
	rightid=@east
	authby=secret
	type=iptfs
	auto=route

include	/testing/baseconfigs/all/etc/ipsec.d/ipsec.conf.common
