# /etc/ipsec.conf - Libreswan IPsec configuration file

version 2.0

config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	plutodebug=all
	dumpdir=/tmp

conn named
	# north
	left=192.1.3.209
	right=right.libreswan.org
	leftid="@west"
	rightid="@east"
	leftsubnet=192.0.1.0/24
	rightsubnet=192.0.2.0/24
	authby=secret
	retransmit-interval=20s
	retransmit-timeout=10s
