config setup
	ikev1-policy=drop
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	dumpdir=/tmp
	plutodebug=all,crypt

conn %default
	keyexchange=ikev2
	left=192.1.2.45
	right=192.1.2.23
	authby=secret
	leftid=@west
	rightid=@east
	leftsubnet=192.0.1.0/24
	rightsubnet=192.0.2.0/24

conn east
	ike=aes;ke=ml_kem_1024
