# /etc/ipsec.conf - Libreswan IPsec configuration file

config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	dumpdir=/tmp
	plutodebug=all

conn westnet-eastnet
	left=2001:db8:1:2::45
	leftid=@west
	leftsubnet=192.0.1.0/24
	right=2001:db8:1:2::23
	rightid=@east
	rightsubnet=192.0.2.0/24
	authby=secret
	keyexchange=ikev2
	ike=aes-sha1
	esp=aes-sha1
	replay-window=64
	compress=yes
	auto=ondemand
