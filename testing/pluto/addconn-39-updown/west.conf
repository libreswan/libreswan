
config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	dumpdir=/tmp
	plutodebug=all
	ikev1-policy=accept

conn addconn
     left=1.2.3.4
     right=5.6.7.8

conn addconn--leftupdown=
     also=addconn
     leftupdown=

conn addconn--leftupdown=quotes
     also=addconn
     leftupdown=""

conn addconn--leftupdown=%disabled
     also=addconn
     leftupdown=%disabled

conn addconn--leftupdown=left
     also=addconn
     leftupdown=left

conn addconn--rightupdown=right
     also=addconn
     rightupdown=right

conn addconn--type=passthrough
     also=addconn
     type=passthrough
     authby=never

conn addconn--type=passthrough--leftupdown=left
     also=addconn--type=passthrough
     leftupdown=left

conn %default
	left=192.1.2.45
	right=192.1.2.23
	leftsubnet=192.0.1.0/24
	rightsubnet=192.0.2.0/24

conn addconn--updown=/tmp/updown.sh
	left-updown="/tmp/updown.sh custom"
conn addconn--updown=/tmp/updown.sh--updown-config=exec
	also=addconn--updown=/tmp/updown.sh
	left-updown-config=exec

conn addconn--updown=updown.sh
	left-updown="updown.sh custom"
conn addconn--updown=updown.sh--updown-config=exec
	also=addconn--updown=updown.sh
	left-updown-config=exec
