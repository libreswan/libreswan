config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	dumpdir=/var/tmp
	plutodebug=all
	nhelpers=0

conn west
	keyexchange=ikev2
	auto=ignore
	# host
	left=192.1.2.45
	right=192.1.2.23
	# client
	leftsubnet=192.0.1.0/24,2001:db8:0:1::/64
	rightsubnet=192.0.2.0/24,2001:db8:0:2::/64
	# auth
	leftid=@west
	authby=secret
	rightid=@east
	type=iptfs
