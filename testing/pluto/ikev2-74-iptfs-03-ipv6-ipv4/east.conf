config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	plutodebug=all
	dumpdir=/var/tmp

conn east
	keyexchange=ikev2
	auto=ignore
	# host
	left=%any
	right=192.1.2.23
	# client
	leftsubnet=192.0.1.0/24,2001:db8:0:1::/64
	rightsubnet=192.0.2.0/24,2001:db8:0:2::/64
	# auth
	leftid=@west
	authby=secret
	rightid=@east
	type=iptfs
