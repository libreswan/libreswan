
config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	dumpdir=/tmp
	plutodebug=all

conn ikev2-north-east
	keyexchange=ikev2
	left=192.1.3.33
	leftid=@GroupID
	rightxauthserver=yes
	leftxauthclient=yes
	rightmodecfgserver=yes
	leftmodecfgclient=yes
	right=192.1.2.23
	rightsubnet=192.0.2.0/24
	modecfgpull=yes
	modecfgdns="1.2.3.4, 5.6.7.8"
	rightid=@east
	authby=secret
